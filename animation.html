<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .circle {
            width: 100px;
            height: 100px;
            background-color: red;
            border-radius: 50%;
            position: relative;
            animation: moveAndChange 3s infinite alternate;
        }

        @keyframes moveAndChange {
            0% {
                left: -200px;
                background-color: red;
                transform: scale(1);
            }
            50% {
                background-color: blue;
                transform: scale(1.2);
            }
            100% {
                left: 200px;
                background-color: green;
                transform: scale(1);
            }
        }

        p {
            position: absolute;
            bottom: 20px;
            text-align: center;
            width: 100%;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="circle"></div>
    <p>https://github.com/catxco/basic_animation
</body>
</html>
